<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolutor 3000 | Edición Pro</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="glass-card p-5 text-center">
            <h1 class="mb-4">MÁQUINA DE MATES</h1>
            <p class="text-light-50 mb-4">Introduce los coeficientes de ax² + bx + c = 0</p>
            
            <div class="row g-3 mb-4">
                <div class="col">
                    <input type="number" id="inputA" class="form-control pro-input" placeholder="a">
                </div>
                <div class="col">
                    <input type="number" id="inputB" class="form-control pro-input" placeholder="b">
                </div>
                <div class="col">
                    <input type="number" id="inputC" class="form-control pro-input" placeholder="c">
                </div>
            </div>

            <button onclick="calcularEcuacion()" class="btn btn-glow w-100 mb-4">¡FUNDIR ECUACIÓN!</button>

            <div id="resultadoBox" class="result-area d-none">
                <h4 id="tipoSolucion">Resultado:</h4>
                <div id="valorX" class="display-6 mt-2"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
