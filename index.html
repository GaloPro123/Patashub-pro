<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resolutor 3000 | Edición Pro</title>
    <!-- Bootstrap para que se vea de cine -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            max-width: 450px;
            width: 90%;
            text-align: center;
        }
        .pro-input {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(0, 210, 255, 0.3) !important;
            color: #00d2ff !important;
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        .btn-glow {
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            border: none;
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 12px;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }
        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 210, 255, 0.5);
            color: white;
        }
        #resultadoBox {
            margin-top: 25px;
            padding: 15px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-left: 4px solid #00d2ff;
            display: none; /* Se activa con JS */
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2 class="mb-4">HACKER MATES</h2>
        <p class="small text-info">Resuelve ax² + bx + c = 0</p>
        
        <form id="ecuacionForm">
            <input type="number" id="a" class="form-control pro-input" placeholder="Valor de a" required>
            <input type="number" id="b" class="form-control pro-input" placeholder="Valor de b" required>
            <input type="number" id="c" class="form-control pro-input" placeholder="Valor de c" required>
            
            <button type="button" onclick="calcular()" class="btn btn-glow w-100 mt-3">¡DARLE CAÑA!</button>
        </form>

        <div id="resultadoBox">
            <h5 id="tipo" class="text-info"></h5>
            <div id="valores" class="h4 mt-2"></div>
        </div>
    </div>

    <script>
        function calcular() {
            // Pillamos los valores de los inputs
            const a = parseFloat(document.getElementById('a').value);
            const b = parseFloat(document.getElementById('b').value);
            const c = parseFloat(document.getElementById('c').value);
            const box = document.getElementById('resultadoBox');
            const tipo = document.getElementById('tipo');
            const valores = document.getElementById('valores');

            // Validación de seguridad
            if (isNaN(a) || isNaN(b) || isNaN(c)) {
                alert("Oye, máquina, rellena todos los campos.");
                return;
            }

            if (a === 0) {
                alert("Si 'a' es 0, no es de segundo grado, fiera.");
                return;
            }

            // El discriminante (lo que hay bajo la raíz)
            const d = (b * b) - (4 * a * c);
            box.style.display = "block";

            if (d > 0) {
                let x1 = (-b + Math.sqrt(d)) / (2 * a);
                let x2 = (-b - Math.sqrt(d)) / (2 * a);
                tipo.innerText = "¡Dos soluciones reales!";
                valores.innerHTML = `x1 = ${x1.toFixed(2)}<br>x2 = ${x2.toFixed(2)}`;
            } else if (d === 0) {
                let x = -b / (2 * a);
                tipo.innerText = "¡Solución clavada!";
                valores.innerText = `x = ${x.toFixed(2)}`;
            } else {
                let real = (-b / (2 * a)).toFixed(2);
                let imag = (Math.sqrt(Math.abs(d)) / (2 * a)).toFixed(2);
                tipo.innerText = "Números complejos (imaginarios):";
                valores.innerHTML = `x1 = ${real} + ${imag}i<br>x2 = ${real} - ${imag}i`;
            }
        }
    </script>
</body>
</html>
